<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" width="1100" height="780" style="background-color: #ffffff;">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <filter id="shadowLight" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="2" flood-color="#00000010"/>
    </filter>
    <linearGradient id="chromeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="cloudRunGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="vertexGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFECB3"/>
    </linearGradient>
    <linearGradient id="chromeNodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
    <linearGradient id="cloudNodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
    <linearGradient id="vertexNodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#FFF8E1"/>
    </linearGradient>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546E7A"/>
    </marker>
    <marker id="arrowLeft" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="10 0, 0 3.5, 10 7" fill="#546E7A"/>
    </marker>
    <marker id="arrowRightBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/>
    </marker>
    <marker id="arrowLeftBlue" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="10 0, 0 3.5, 10 7" fill="#1565C0"/>
    </marker>
    <marker id="arrowRightGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E7D32"/>
    </marker>
    <marker id="arrowLeftGreen" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="10 0, 0 3.5, 10 7" fill="#2E7D32"/>
    </marker>
    <marker id="arrowRightAmber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E65100"/>
    </marker>
    <marker id="arrowLeftAmber" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="10 0, 0 3.5, 10 7" fill="#E65100"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1A237E" letter-spacing="0.5">AccessBrowse Architecture</text>
  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#78909C" letter-spacing="0.3">Voice-Controlled Web Browsing Agent</text>

  <!-- ============================================ -->
  <!-- LAYER 1: Chrome Browser Extension -->
  <!-- ============================================ -->
  <g filter="url(#shadow)">
    <rect x="30" y="80" width="1040" height="200" rx="12" fill="url(#chromeGrad)" stroke="#1565C0" stroke-width="2"/>
  </g>
  <!-- Layer label -->
  <g>
    <rect x="50" y="72" width="240" height="24" rx="12" fill="#1565C0"/>
    <text x="170" y="88" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff" letter-spacing="0.5">Chrome Browser Extension</text>
  </g>
  <!-- Chrome icon hint -->
  <circle cx="52" cy="84" r="8" fill="#1565C0" opacity="0"/>

  <!-- Sidepanel Node -->
  <g filter="url(#shadowLight)">
    <rect x="60" y="115" width="210" height="78" rx="8" fill="url(#chromeNodeGrad)" stroke="#1976D2" stroke-width="1.5"/>
    <rect x="60" y="115" width="210" height="26" rx="8" fill="#1976D2"/>
    <rect x="60" y="133" width="210" height="8" fill="#1976D2"/>
  </g>
  <text x="165" y="133" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Sidepanel</text>
  <text x="165" y="160" text-anchor="middle" font-size="10.5" fill="#37474F">React + TypeScript</text>
  <text x="165" y="178" text-anchor="middle" font-size="10.5" fill="#546E7A">Transcript, Controls</text>

  <!-- Service Worker Node -->
  <g filter="url(#shadowLight)">
    <rect x="310" y="115" width="210" height="78" rx="8" fill="url(#chromeNodeGrad)" stroke="#1976D2" stroke-width="1.5"/>
    <rect x="310" y="115" width="210" height="26" rx="8" fill="#1976D2"/>
    <rect x="310" y="133" width="210" height="8" fill="#1976D2"/>
  </g>
  <text x="415" y="133" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Service Worker</text>
  <text x="415" y="160" text-anchor="middle" font-size="10.5" fill="#37474F">WebSocket Client</text>
  <text x="415" y="178" text-anchor="middle" font-size="10.5" fill="#546E7A">Screenshot Relay</text>

  <!-- Content Script Node -->
  <g filter="url(#shadowLight)">
    <rect x="560" y="115" width="210" height="78" rx="8" fill="url(#chromeNodeGrad)" stroke="#1976D2" stroke-width="1.5"/>
    <rect x="560" y="115" width="210" height="26" rx="8" fill="#1976D2"/>
    <rect x="560" y="133" width="210" height="8" fill="#1976D2"/>
  </g>
  <text x="665" y="133" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Content Script</text>
  <text x="665" y="160" text-anchor="middle" font-size="10.5" fill="#37474F">Coordinate-Based</text>
  <text x="665" y="178" text-anchor="middle" font-size="10.5" fill="#546E7A">DOM Actions</text>

  <!-- Offscreen Document Node -->
  <g filter="url(#shadowLight)">
    <rect x="810" y="115" width="230" height="78" rx="8" fill="url(#chromeNodeGrad)" stroke="#1976D2" stroke-width="1.5"/>
    <rect x="810" y="115" width="230" height="26" rx="8" fill="#1976D2"/>
    <rect x="810" y="133" width="230" height="8" fill="#1976D2"/>
  </g>
  <text x="925" y="133" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Offscreen Document</text>
  <text x="925" y="160" text-anchor="middle" font-size="10.5" fill="#37474F">Mic 16kHz In</text>
  <text x="925" y="178" text-anchor="middle" font-size="10.5" fill="#546E7A">Speaker 24kHz Out</text>

  <!-- Chrome internal connections -->
  <!-- SP <--> SW -->
  <line x1="270" y1="154" x2="310" y2="154" stroke="#1565C0" stroke-width="1.5" marker-end="url(#arrowRightBlue)" marker-start="url(#arrowLeftBlue)"/>
  <!-- SW <--> CS -->
  <line x1="520" y1="154" x2="560" y2="154" stroke="#1565C0" stroke-width="1.5" marker-end="url(#arrowRightBlue)" marker-start="url(#arrowLeftBlue)"/>
  <!-- SW <--> OS -->
  <line x1="520" y1="140" x2="810" y2="140" stroke="#1565C0" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowRightBlue)" marker-start="url(#arrowLeftBlue)"/>
  <text x="665" y="136" text-anchor="middle" font-size="8.5" fill="#1565C0" font-weight="500">Chrome Messages</text>

  <!-- ============================================ -->
  <!-- LAYER 2: Google Cloud Run -->
  <!-- ============================================ -->
  <g filter="url(#shadow)">
    <rect x="30" y="330" width="1040" height="220" rx="12" fill="url(#cloudRunGrad)" stroke="#2E7D32" stroke-width="2"/>
  </g>
  <!-- Layer label -->
  <g>
    <rect x="50" y="322" width="200" height="24" rx="12" fill="#2E7D32"/>
    <text x="150" y="338" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff" letter-spacing="0.5">Google Cloud Run</text>
  </g>

  <!-- FastAPI WebSocket Server -->
  <g filter="url(#shadowLight)">
    <rect x="60" y="360" width="210" height="78" rx="8" fill="url(#cloudNodeGrad)" stroke="#388E3C" stroke-width="1.5"/>
    <rect x="60" y="360" width="210" height="26" rx="8" fill="#388E3C"/>
    <rect x="60" y="378" width="210" height="8" fill="#388E3C"/>
  </g>
  <text x="165" y="378" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">FastAPI</text>
  <text x="165" y="405" text-anchor="middle" font-size="10.5" fill="#37474F">WebSocket Server</text>
  <text x="165" y="423" text-anchor="middle" font-size="10.5" fill="#546E7A">Message Router</text>

  <!-- Voice Agent -->
  <g filter="url(#shadowLight)">
    <rect x="310" y="360" width="210" height="78" rx="8" fill="url(#cloudNodeGrad)" stroke="#388E3C" stroke-width="1.5"/>
    <rect x="310" y="360" width="210" height="26" rx="8" fill="#388E3C"/>
    <rect x="310" y="378" width="210" height="8" fill="#388E3C"/>
  </g>
  <text x="415" y="378" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Voice Agent</text>
  <text x="415" y="405" text-anchor="middle" font-size="10.5" fill="#37474F">GenAI SDK</text>
  <text x="415" y="423" text-anchor="middle" font-size="10.5" fill="#546E7A">Live API Client</text>

  <!-- Session Manager -->
  <g filter="url(#shadowLight)">
    <rect x="560" y="360" width="210" height="78" rx="8" fill="url(#cloudNodeGrad)" stroke="#388E3C" stroke-width="1.5"/>
    <rect x="560" y="360" width="210" height="26" rx="8" fill="#388E3C"/>
    <rect x="560" y="378" width="210" height="8" fill="#388E3C"/>
  </g>
  <text x="665" y="378" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Session Manager</text>
  <text x="665" y="405" text-anchor="middle" font-size="10.5" fill="#37474F">Max 3 Concurrent</text>
  <text x="665" y="423" text-anchor="middle" font-size="10.5" fill="#546E7A">State + Cleanup</text>

  <!-- Tools group -->
  <g>
    <rect x="810" y="348" width="240" height="105" rx="10" fill="none" stroke="#2E7D32" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="930" y="366" text-anchor="middle" font-size="10" font-weight="600" fill="#2E7D32" letter-spacing="0.5">TOOLS</text>
  </g>

  <!-- browse_web Tool -->
  <g filter="url(#shadowLight)">
    <rect x="825" y="375" width="100" height="66" rx="6" fill="url(#cloudNodeGrad)" stroke="#388E3C" stroke-width="1.5"/>
    <rect x="825" y="375" width="100" height="22" rx="6" fill="#43A047"/>
    <rect x="825" y="391" width="100" height="6" fill="#43A047"/>
  </g>
  <text x="875" y="391" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">browse_web</text>
  <text x="875" y="413" text-anchor="middle" font-size="9" fill="#37474F">Multi-Step</text>
  <text x="875" y="428" text-anchor="middle" font-size="9" fill="#546E7A">Loop</text>

  <!-- read_page Tool -->
  <g filter="url(#shadowLight)">
    <rect x="938" y="375" width="100" height="66" rx="6" fill="url(#cloudNodeGrad)" stroke="#388E3C" stroke-width="1.5"/>
    <rect x="938" y="375" width="100" height="22" rx="6" fill="#43A047"/>
    <rect x="938" y="391" width="100" height="6" fill="#43A047"/>
  </g>
  <text x="988" y="391" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">read_page</text>
  <text x="988" y="413" text-anchor="middle" font-size="9" fill="#37474F">A11y</text>
  <text x="988" y="428" text-anchor="middle" font-size="9" fill="#546E7A">Summaries</text>

  <!-- Cloud Run internal connections -->
  <!-- FastAPI --> Voice Agent -->
  <line x1="270" y1="399" x2="310" y2="399" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#arrowRightGreen)"/>
  <!-- FastAPI --> Session Manager -->
  <line x1="270" y1="412" x2="560" y2="412" stroke="#2E7D32" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowRightGreen)"/>
  <!-- Voice Agent --> Tools -->
  <line x1="520" y1="405" x2="825" y2="405" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#arrowRightGreen)"/>

  <!-- ============================================ -->
  <!-- LAYER 3: Vertex AI -->
  <!-- ============================================ -->
  <g filter="url(#shadow)">
    <rect x="30" y="600" width="1040" height="160" rx="12" fill="url(#vertexGrad)" stroke="#E65100" stroke-width="2"/>
  </g>
  <!-- Layer label -->
  <g>
    <rect x="50" y="592" width="260" height="24" rx="12" fill="#E65100"/>
    <text x="180" y="608" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff" letter-spacing="0.5">Google Cloud / Vertex AI</text>
  </g>

  <!-- Gemini Live API -->
  <g filter="url(#shadowLight)">
    <rect x="80" y="630" width="420" height="110" rx="8" fill="url(#vertexNodeGrad)" stroke="#EF6C00" stroke-width="1.5"/>
    <rect x="80" y="630" width="420" height="28" rx="8" fill="#EF6C00"/>
    <rect x="80" y="650" width="420" height="8" fill="#EF6C00"/>
  </g>
  <text x="290" y="649" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Gemini Live API</text>
  <text x="290" y="680" text-anchor="middle" font-size="11" fill="#37474F" font-weight="500">gemini-2.5-flash-native-audio</text>
  <text x="290" y="700" text-anchor="middle" font-size="10.5" fill="#546E7A">Bidirectional Voice Streaming</text>
  <text x="290" y="718" text-anchor="middle" font-size="10.5" fill="#546E7A">Real-time Audio Transcription</text>

  <!-- Gemini Computer Use -->
  <g filter="url(#shadowLight)">
    <rect x="560" y="630" width="480" height="110" rx="8" fill="url(#vertexNodeGrad)" stroke="#EF6C00" stroke-width="1.5"/>
    <rect x="560" y="630" width="480" height="28" rx="8" fill="#EF6C00"/>
    <rect x="560" y="650" width="480" height="8" fill="#EF6C00"/>
  </g>
  <text x="800" y="649" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Gemini Computer Use</text>
  <text x="800" y="680" text-anchor="middle" font-size="11" fill="#37474F" font-weight="500">gemini-2.5-computer-use</text>
  <text x="800" y="700" text-anchor="middle" font-size="10.5" fill="#546E7A">Screenshot Analysis</text>
  <text x="800" y="718" text-anchor="middle" font-size="10.5" fill="#546E7A">Screenshot &#x2192; Coordinates</text>

  <!-- ============================================ -->
  <!-- CROSS-LAYER CONNECTIONS -->
  <!-- ============================================ -->

  <!-- WebSocket: SW <--> FastAPI (major connection) -->
  <path d="M 415 193 L 415 228 Q 415 248 395 258 L 200 298 Q 165 308 165 328 L 165 360"
        fill="none" stroke="#546E7A" stroke-width="2.5"
        marker-end="url(#arrowRight)" marker-start="url(#arrowLeft)"/>
  <!-- WebSocket label -->
  <g>
    <rect x="215" y="242" width="175" height="38" rx="6" fill="#ffffff" stroke="#78909C" stroke-width="1"/>
    <text x="302" y="256" text-anchor="middle" font-size="9.5" font-weight="600" fill="#37474F">WebSocket</text>
    <text x="302" y="272" text-anchor="middle" font-size="8.5" fill="#78909C">Audio + Text + Screenshots</text>
  </g>

  <!-- Voice Agent <--> Gemini Live API (bidi audio) -->
  <path d="M 415 438 L 415 478 Q 415 498 380 518 L 310 558 Q 290 568 290 588 L 290 630"
        fill="none" stroke="#E65100" stroke-width="2.5"
        marker-end="url(#arrowRightAmber)" marker-start="url(#arrowLeftAmber)"/>
  <!-- Bidi Audio label -->
  <g>
    <rect x="316" y="492" width="120" height="22" rx="6" fill="#FFF3E0" stroke="#EF6C00" stroke-width="1"/>
    <text x="376" y="507" text-anchor="middle" font-size="9" font-weight="500" fill="#E65100">Bidi Audio Stream</text>
  </g>

  <!-- Tools --> Gemini Computer Use -->
  <path d="M 875 441 L 875 478 Q 875 498 860 518 L 830 558 Q 820 568 820 588 L 820 630"
        fill="none" stroke="#E65100" stroke-width="2"
        marker-end="url(#arrowRightAmber)"/>
  <path d="M 988 441 L 988 478 Q 988 498 960 518 L 910 558 Q 890 568 880 588 L 860 630"
        fill="none" stroke="#E65100" stroke-width="2"
        marker-end="url(#arrowRightAmber)"/>
  <!-- Vertex AI API label -->
  <g>
    <rect x="890" y="518" width="95" height="22" rx="6" fill="#FFF3E0" stroke="#EF6C00" stroke-width="1"/>
    <text x="937" y="533" text-anchor="middle" font-size="9" font-weight="500" fill="#E65100">Vertex AI API</text>
  </g>

  <!-- Browser control: Tools --> Content Script (via Service Worker) -->
  <path d="M 875 375 L 875 340 Q 860 320 820 310 L 700 272 Q 665 260 665 228 L 665 193"
        fill="none" stroke="#546E7A" stroke-width="1.5" stroke-dasharray="6,3"
        marker-end="url(#arrowRight)"/>
  <g>
    <rect x="700" y="268" width="130" height="18" rx="5" fill="#ffffff" stroke="#90A4AE" stroke-width="0.8"/>
    <text x="765" y="280" text-anchor="middle" font-size="8" fill="#78909C">Browser Control Actions</text>
  </g>

</svg>